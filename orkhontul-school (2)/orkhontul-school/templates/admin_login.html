{% extends "base.html" %}
{% block title %}Admin Нэвтрэх{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">◈</div>
    <h1>Admin Panel</h1>
    <p class="auth-sub">Орхонтуул ЕБС — Даалгаврын сан</p>
    {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}
    <form method="POST" class="auth-form">
      <div class="field-group">
        <label>Нууц үг</label>
        <input type="password" name="password" placeholder="••••••••" autofocus required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Нэвтрэх →</button>
    </form>
    <a href="/" class="back-link">← Нүүр хуудас руу буцах</a>
  </div>
</div>
{% endblock %}
