<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Орхонтуул ЕБС — Даалгаврын сан{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mongolian&family=Rajdhani:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <span class="brand-icon">◈</span>
    <div class="brand-text">
      <span class="brand-main">ОРХОНТУУЛ ЕБС</span>
      <span class="brand-sub">Даалгаврын Сан</span>
    </div>
  </div>
  <ul class="nav-links">
    <li><a href="/" {% if request.path == '/' %}class="active"{% endif %}>Нүүр</a></li>
    <li><a href="/questions" {% if request.path == '/questions' %}class="active"{% endif %}>Даалгавар</a></li>
    <li><a href="/blueprint" {% if request.path == '/blueprint' %}class="active"{% endif %}>Блупринт</a></li>
  </ul>
  <div class="nav-badge">1–12-р анги</div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  <p>© 2025 Орхонтуул ЕБС &nbsp;·&nbsp; Даалгаврын сан &nbsp;·&nbsp; Боловсруулсан: МУ-ын боловсролын стандартын дагуу</p>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
